<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table>
      <tr>
        <td>Username</td>
        <td>
          <input type="text" placeholder="Enter a username" id="myname" />
        </td>
      </tr>
      <tr>
        <td>Password</td>
        <td>
          <input type="password" placeholder="Enter a password" id="mypass" />
        </td>
      </tr>

      <tr>
        <td><button onclick="login()">Login</button></td>
      </tr>
    </table>

    <script>
      function login() {
        password = document.getElementById("mypass").value;
        username = document.getElementById("myname").value;

        currectname = "admin";
        currectpassword = "admin123";

        if (password == currectpassword && username == currectname) {
            alert("Login sussefully");
        }
        else
        {
            alert("Invalid username or password");
        }
      }
    </script>
  </body>
</html>
