<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      str = prompt("Enter a string : ");

      arr = str.split(" ");

      word = prompt("Enter a word to find  in string: ");

      rep = prompt("Enter a word to replace in this string : ");

      // s = str.replace(word , rep);

      // document.write(s);

      for (i = 0; i < arr.length; i++) {
        if (arr[i] == word) {
            arr[i] = rep;
        }
      }

      document.write(arr);
    </script>
  </body>
</html>
