<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      n = parseInt(prompt("Enter a size of an array: "));

      arr = [n];

      for (i = 0; i < n; i++) {
        arr[i] = parseInt(prompt("Enter a number: "));
      }

      for (i = 0; i < n - 1; i++) {
        for (j = i + 1; j < n; j++) {
          if (arr[i] > arr[j]) {
                temp = arr[i];
                arr[i] = arr[j];
                arr[j] = temp;
            }
        }
      }

      document.write(arr + " ");
    </script>
  </body>
</html>
