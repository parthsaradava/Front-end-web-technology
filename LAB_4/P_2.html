<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      a = parseInt(prompt("Enter a first number: "));
      b = parseInt(prompt("Enter a second number: "));

      for (i = a; i <= b; i++) {
        count = 1;
        for (j = 2; j < i; j++) {
          if (i % j == 0) {
            count = 0;
          }
        }
        if(count)
        {
            document.write(i + " ");
        }
      }
    </script>
  </body>
</html>
