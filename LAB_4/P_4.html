<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      a = parseInt(prompt("Enter a first number: "));

      b = parseInt(prompt("Enter a second number: "));

      min = Math.min(a, b);

      gcd = 1;

      for (i = 2; i <= min; i++) {
        if (a % i == 0 && b % i == 0) {
          gcd = i;
        }
      }

      document.write(gcd);
    </script>
  </body>
</html>
