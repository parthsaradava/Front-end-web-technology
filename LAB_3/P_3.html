<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      a = parseInt(prompt("Enter a number to find factorial: "));
        multi = 1;
      for (i = 1; i <= a; i++) {
        multi = multi * i;
      }

      document.write(a+"! "+" = "+multi)
    </script>
  </body>
</html>
