<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      a = parseInt(prompt("Enter a number to find prime: "));

      flag = 1;

      for (i = 2; i < a; i++) {
        if (a % i == 0) 
        {
            flag = 0;
        }
      }

      if(flag == 1)
      {
        document.write(a + " is a prime number");
      }
      else
      {
        document.write(a + " is not prime number");
      }
    </script>
  </body>
</html>
