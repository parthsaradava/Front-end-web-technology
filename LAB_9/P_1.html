<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        a = 10;
        b = 5;

        function sum(a , b , callback)
        {
            sum = a+b;
            callback(sum);
        }

        function display(ans)
        {
            console.log("sum =" , ans);
        }

        sum(a , b , display);
    </script>
</body>
</html>
