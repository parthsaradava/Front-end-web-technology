<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n = parseFloat(prompt("Enter a number: "));
        

        document.write("Floor = " + Math.floor(n));
        document.write("<br/>");
        document.write("Celing = " + Math.ceil(n));
        document.write("<br/>");
        document.write("Round = " + Math.round(n));
        document.write("<br/>");
        document.write("Truncate = " + Math.trunc(n));
        document.write("<br/>")
    </script>
</body>
</html>
