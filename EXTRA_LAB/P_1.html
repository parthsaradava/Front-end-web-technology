<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P_1</title>
</head>
<body>
    <script>

        n1 = parseInt(prompt("Enter a number: "));
        n2 = parseInt(prompt("Enter a number: "));

        Max = Math.max(n1 ,n2);
        document.write("Max number : " + Max + "<br/>");
        

        Min = Math.min(n1 ,n2);

       
        document.write("Min number : "+Min + "<br/>");

        document.write("abs : "+Math.abs(n1));
    </script>
</body>
</html>
