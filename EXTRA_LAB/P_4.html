<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        date = new Date();

        document.write("Current date : " + date);   
        document.write("<br/>")
        document.write("Time : " + date.getTime());
        document.write("<br/>");
        document.write("Day : " + date.getDay());
        document.write("<br/>");
        document.write("Month : " + date.getMonth());
        document.write("<br/>");
        document.write("Year : " + date.getFullYear());
        document.write("<br/>");
    </script>
</body>
</html>
