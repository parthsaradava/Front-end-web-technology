<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        dist = parseInt(prompt("Enter a distance"));

        ang = parseInt(prompt("Enter a angle"));

        angle = (ang * Math.PI / 180);


        height = dist * Math.tan(angle);


        document.write("Height is : " + height);

    </script>
</body>
</html>
