<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      n = parseInt(prompt("Enter a size of an possword: "));
      sum = ""
      for (i = 1; i <= n; i++) {
        rand = Math.floor(Math.random() * 10)
        // document.write(rand);
        sum += rand
      }

      document.write(sum);
    
    </script>
  </body>
</html>
