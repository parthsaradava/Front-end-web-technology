<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD App</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            width:500px;
            margin:auto;
            background:#fff;
            padding:20px;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        label{
            font-weight:bold;
        }

        input{
            width:70%;
            padding:8px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:4px;
        }

        button{
            padding:8px 15px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:4px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
            padding:10px;
        }

        td{
            padding:10px;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        table, th, td{
            border:1px solid #ddd;
        }
    </style>
</head>

<body>
    <div class="container">

        <label for="name">Name :</label>
        <input type="text" id="name">
        <button onclick="AddName()" id="add">Add</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>

    </div>

    <script src="CRUD.js"></script>

</body>
</html>
